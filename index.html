<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f1e8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#19151a" media="(prefers-color-scheme: dark)">
    <title>Cosplay Wig Styling Lessons</title>
    <link rel="stylesheet" href="styles.css?v=20260713-atelier-remodel">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true"><span>W</span></div>
          <div>
            <p class="eyebrow">90-day styling atelier</p>
            <h1>Cosplay Wig Styling</h1>
          </div>
        </div>
        <div class="top-actions" aria-label="Progress tools">
          <button class="ghost-button" type="button" id="exportButton" title="Export progress">Export</button>
          <label class="ghost-button file-button" for="importFile" title="Import progress">Import</label>
          <input id="importFile" type="file" accept="application/json">
        </div>
      </header>

      <main>
        <section class="overview" aria-labelledby="overviewTitle">
          <div class="overview-copy">
            <p class="eyebrow">Your course notebook</p>
            <h2 id="overviewTitle">Today's lesson</h2>
            <p id="todaySummary">Loading lesson data...</p>
          </div>
          <div class="progress-block" aria-label="Course completion">
            <div class="progress-number" id="progressNumber">0%</div>
            <div class="progress-track" aria-hidden="true">
              <span id="progressFill"></span>
            </div>
            <p id="progressText">0 of 90 lessons complete</p>
          </div>
        </section>

        <nav class="tabs" aria-label="Course views" role="tablist">
          <button class="tab is-active" id="todayTab" type="button" role="tab" aria-selected="true" aria-controls="detail" data-view="today">Today</button>
          <button class="tab" id="lessonsTab" type="button" role="tab" aria-selected="false" aria-controls="detail" data-view="lessons" tabindex="-1">All lessons</button>
          <button class="tab" id="glossaryTab" type="button" role="tab" aria-selected="false" aria-controls="detail" data-view="glossary" tabindex="-1">Glossary</button>
          <button class="tab" id="progressTab" type="button" role="tab" aria-selected="false" aria-controls="detail" data-view="progress" tabindex="-1">Progress</button>
        </nav>

        <div class="workspace" id="workspace">
          <aside class="lesson-list" aria-label="Lesson list">
            <div class="search-wrap">
              <label for="lessonSearch">Find a lesson</label>
              <input id="lessonSearch" type="search" placeholder="Search lessons or terms">
            </div>
            <div id="lessonList"></div>
          </aside>

          <section class="detail" id="detail" role="tabpanel" aria-labelledby="todayTab" aria-live="polite"></section>
        </div>
      </main>
    </div>

    <template id="lessonButtonTemplate">
      <button class="lesson-button" type="button">
        <span class="lesson-day"></span>
        <span class="lesson-card">
          <span class="lesson-title"></span>
          <span class="lesson-state"></span>
        </span>
      </button>
    </template>

    <script src="app.js?v=20260713-atelier-remodel" type="module"></script>
  </body>
</html>
